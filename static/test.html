<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flow2API 测试页面</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  color: #17181c;
  background: #f6f7f9;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  min-height: 58px;
  padding: 0 32px;
  border-bottom: 1px solid #e4e7ec;
  background: rgba(255,255,255,.94);
  backdrop-filter: blur(12px);
}
.brand { font-size: 20px; font-weight: 750; letter-spacing: 0; }
.nav { display: flex; align-items: center; gap: 8px; }
.nav a {
  display: inline-flex;
  align-items: center;
  height: 34px;
  padding: 0 12px;
  border-radius: 6px;
  color: #4b5565;
  text-decoration: none;
  font-size: 14px;
  font-weight: 600;
}
.nav a:hover, .nav a.active { background: #111827; color: #fff; }
.page { width: min(1440px, calc(100% - 48px)); margin: 24px auto 40px; }
.toolbar {
  display: grid;
  grid-template-columns: minmax(220px, 1.15fr) minmax(180px, .85fr) minmax(240px, 1fr) auto;
  gap: 12px;
  align-items: end;
  padding: 16px;
  border: 1px solid #e4e7ec;
  border-radius: 8px;
  background: #fff;
}
.field label { display: block; margin-bottom: 6px; color: #667085; font-size: 12px; font-weight: 700; }
input, select, textarea {
  width: 100%;
  border: 1px solid #d7dce3;
  border-radius: 6px;
  background: #fff;
  color: #17181c;
  font: inherit;
}
input, select { height: 38px; padding: 0 11px; }
textarea { min-height: 260px; resize: vertical; padding: 12px; line-height: 1.55; }
input:focus, select:focus, textarea:focus { outline: 2px solid rgba(20, 184, 166, .18); border-color: #14b8a6; }
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 38px;
  padding: 0 14px;
  border: 1px solid #d7dce3;
  border-radius: 6px;
  background: #fff;
  color: #17181c;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn:hover { background: #f2f4f7; }
.btn.primary { border-color: #111827; background: #111827; color: #fff; }
.btn.primary:hover { background: #262f3f; }
.btn:disabled { cursor: not-allowed; opacity: .55; }
.main {
  display: grid;
  grid-template-columns: minmax(420px, 520px) minmax(0, 1fr);
  gap: 18px;
  margin-top: 18px;
}
.panel {
  border: 1px solid #e4e7ec;
  border-radius: 8px;
  background: #fff;
}
.panel-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 54px;
  padding: 0 16px;
  border-bottom: 1px solid #e4e7ec;
}
.panel-title { font-size: 15px; font-weight: 750; }
.panel-body { padding: 16px; }
.stack { display: grid; gap: 14px; }
.template-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
.action-row { display: flex; flex-wrap: wrap; gap: 10px; }
.action-row .btn { flex: 1 1 130px; }
.status-note { min-height: 18px; color: #667085; font-size: 12px; }
.dropzone {
  position: relative;
  min-height: 150px;
  border: 1.5px dashed #b8c1cc;
  border-radius: 8px;
  background: #fbfcfd;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px;
  cursor: pointer;
}
.dropzone.dragover { border-color: #14b8a6; background: #f0fdfa; }
.drop-empty { color: #667085; font-size: 14px; text-align: center; }
.preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; width: 100%; }
.preview {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
  border-radius: 7px;
  border: 1px solid #e4e7ec;
  background: #f2f4f7;
}
.preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
.remove {
  position: absolute;
  top: 5px;
  right: 5px;
  width: 24px;
  height: 24px;
  border: 0;
  border-radius: 50%;
  background: rgba(17,24,39,.78);
  color: #fff;
  cursor: pointer;
}
.meta-row { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 120px; gap: 10px; }
.status {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: #667085;
  font-size: 13px;
  font-weight: 650;
}
.dot { width: 8px; height: 8px; border-radius: 50%; background: #98a2b3; }
.dot.running { background: #f59e0b; animation: pulse 1s infinite; }
.dot.done { background: #12b76a; }
.dot.error { background: #f04438; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
.log {
  min-height: 150px;
  max-height: 260px;
  overflow: auto;
  border-radius: 7px;
  background: #101828;
  color: #d0d5dd;
  padding: 12px;
  font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  white-space: pre-wrap;
  word-break: break-word;
}
.result {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
  margin-top: 14px;
}
.result img, .result video {
  width: 100%;
  border-radius: 8px;
  border: 1px solid #e4e7ec;
  background: #fff;
}
.muted { color: #667085; font-size: 12px; }
@media (max-width: 980px) {
  .topbar { padding: 0 16px; }
  .page { width: min(100% - 28px, 1440px); }
  .toolbar, .main { grid-template-columns: 1fr; }
  .template-row, .meta-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">Flow2API</div>
  <nav class="nav">
    <a href="/manage">管理主页</a>
    <a href="/manage">Token 管理</a>
    <a class="active" href="/test">测试页面</a>
  </nav>
</header>

<main class="page">
  <section class="toolbar">
    <div class="field">
      <label for="apiKey">API Key</label>
      <input id="apiKey" type="password" autocomplete="off" placeholder="登录后台后自动填入">
    </div>
    <div class="field">
      <label for="baseUrl">服务地址</label>
      <input id="baseUrl" type="text">
    </div>
    <div class="field">
      <label for="tokenSelect">测试 Token</label>
      <select id="tokenSelect">
        <option value="">自动选择</option>
      </select>
    </div>
    <button class="btn" id="reloadBtn" type="button">刷新</button>
  </section>

  <section class="main">
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">图生图测试</div>
        <span class="muted" id="tokenHint">自动选择</span>
      </div>
      <div class="panel-body stack">
        <div class="meta-row">
          <div class="field">
            <label for="modelSelect">模型</label>
            <select id="modelSelect"></select>
          </div>
          <div class="field">
            <label for="templateSelect">提示词模板</label>
            <select id="templateSelect"></select>
          </div>
          <div class="field">
            <label for="imageCountSelect">生成张数</label>
            <select id="imageCountSelect">
              <option value="1">1 张</option>
              <option value="2">2 张</option>
              <option value="3">3 张</option>
              <option value="4">4 张</option>
            </select>
          </div>
        </div>

        <div class="template-row">
          <button class="btn" id="saveDefaultModelBtn" type="button">保存默认模型</button>
          <span class="status-note" id="settingsStatus"></span>
        </div>

        <div class="field">
          <label for="templateTitleInput">模板标题</label>
          <input id="templateTitleInput" type="text" autocomplete="off">
        </div>

        <div class="field">
          <label for="promptInput">提示词</label>
          <textarea id="promptInput"></textarea>
        </div>

        <div class="action-row">
          <button class="btn" id="applyTemplateBtn" type="button">套用模板</button>
          <button class="btn" id="saveTemplateBtn" type="button">保存模板</button>
          <button class="btn" id="clearImagesBtn" type="button">清空图片</button>
        </div>

        <div class="field">
          <label>参考图片</label>
          <div class="dropzone" id="dropzone">
            <div class="drop-empty" id="dropEmpty">点击选择图片，或直接粘贴/拖入产品图</div>
            <div class="preview-grid" id="previewGrid" hidden></div>
          </div>
          <input id="fileInput" type="file" accept="image/*" multiple hidden>
        </div>

        <button class="btn primary" id="generateBtn" type="button">开始生成</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">输出结果</div>
        <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">等待中</span></div>
      </div>
      <div class="panel-body">
        <div class="log" id="outputLog">准备就绪</div>
        <div class="result" id="outputResult"></div>
      </div>
    </div>
  </section>
</main>

<script>
const DEFAULT_MODEL_ID = "gemini-3.1-flash-image-square";
const SETTINGS_KEY = "flow2api.test.settings.v1";
const DEFAULT_PROMPT = `请保持图片中的产品主体、颜色、材质、造型、细节完全不变，不允许修改产品本身。
在此基础上优化整体视觉效果：
提升图片清晰度和质感
优化产品摆放构图
增强立体光影效果
增加符合产品定位的使用场景
提升高级感和购买欲
保持电商主图风格
画面干净简洁
背景与产品颜色形成对比
突出产品主体
保持真实拍摄效果
不添加文字、水印、Logo
不增加与产品无关的元素
最终效果要求：
符合欧美电商平台主图标准，具有品牌感、专业感和高点击率`;

const PROMPT_TEMPLATES = {
  "欧美电商主图优化": DEFAULT_PROMPT,
  "纯净高级主图": `${DEFAULT_PROMPT}\n背景以干净的浅色或中性色为主，产品边缘清晰，保留自然阴影。`,
  "家居场景主图": `${DEFAULT_PROMPT}\n使用符合欧美家居审美的真实室内场景，环境简洁，产品仍然是唯一视觉焦点。`,
};

const FALLBACK_MODELS = {
  "gemini-3.0-pro-image-square": "Gemini 3.0 Pro image, square",
  "gemini-3.0-pro-image-landscape": "Gemini 3.0 Pro image, landscape",
  "gemini-3.0-pro-image-portrait": "Gemini 3.0 Pro image, portrait",
  "gemini-3.1-flash-image-square": "Gemini 3.1 Flash image, square",
  "imagen-4.0-generate-preview-landscape": "Imagen 4.0 image, landscape",
};

const state = {
  models: {...FALLBACK_MODELS},
  defaultModelId: DEFAULT_MODEL_ID,
  templates: {...PROMPT_TEMPLATES},
  images: [],
  generating: false,
};

const $ = id => document.getElementById(id);
const log = text => {
  const box = $("outputLog");
  box.textContent += text;
  box.scrollTop = box.scrollHeight;
};
const setStatus = (status, text) => {
  $("statusDot").className = `dot ${status || ""}`;
  $("statusText").textContent = text;
};
const setSettingsStatus = text => {
  $("settingsStatus").textContent = text;
  if (text) setTimeout(() => {
    if ($("settingsStatus").textContent === text) $("settingsStatus").textContent = "";
  }, 2200);
};
const dataUrlFromFile = file => new Promise(resolve => {
  const reader = new FileReader();
  reader.onload = () => resolve(reader.result);
  reader.readAsDataURL(file);
});

function loadSavedSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
    if (saved.defaultModelId) state.defaultModelId = String(saved.defaultModelId);
    if (saved.templates && typeof saved.templates === "object") {
      state.templates = {...PROMPT_TEMPLATES, ...saved.templates};
    }
  } catch (_) {
    state.defaultModelId = DEFAULT_MODEL_ID;
    state.templates = {...PROMPT_TEMPLATES};
  }
}

function saveSettings() {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({
    defaultModelId: state.defaultModelId,
    templates: state.templates,
  }));
}

function renderTemplates() {
  const select = $("templateSelect");
  const previous = select.value;
  select.innerHTML = "";
  Object.keys(state.templates).sort((a, b) => a.localeCompare(b, "zh-CN")).forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    select.appendChild(option);
  });
  const selected = state.templates[previous] ? previous : (state.templates["欧美电商主图优化"] ? "欧美电商主图优化" : Object.keys(state.templates)[0]);
  select.value = selected || "";
  $("templateTitleInput").value = selected || "";
  $("promptInput").value = state.templates[selected] || DEFAULT_PROMPT;
}

function renderModels() {
  const modelIds = Object.keys(state.models).sort();
  $("modelSelect").innerHTML = modelIds
    .map(id => `<option value="${id}" ${id === state.defaultModelId ? "selected" : ""}>${id}</option>`)
    .join("");
  if (!state.models[state.defaultModelId] && modelIds.length) {
    $("modelSelect").value = modelIds[0];
  }
}

function renderImages() {
  const grid = $("previewGrid");
  const empty = $("dropEmpty");
  grid.innerHTML = "";
  grid.hidden = state.images.length === 0;
  empty.hidden = state.images.length > 0;
  state.images.forEach((src, index) => {
    const item = document.createElement("div");
    item.className = "preview";
    item.innerHTML = `<img src="${src}" alt="参考图"><button class="remove" type="button" aria-label="删除图片" onclick="removeImage(${index})">×</button>`;
    grid.appendChild(item);
  });
}

window.removeImage = index => {
  state.images.splice(index, 1);
  renderImages();
};

async function addFiles(files) {
  for (const file of Array.from(files || [])) {
    if (!file.type.startsWith("image/")) continue;
    if (state.images.length >= 5) break;
    state.images.push(await dataUrlFromFile(file));
  }
  renderImages();
}

async function loadAdminDefaults() {
  try {
    const res = await fetch("/api/admin/config", { credentials: "include" });
    if (!res.ok) return;
    const data = await res.json();
    if (data.api_key) $("apiKey").value = data.api_key;
  } catch (_) {}
}

async function loadTokens() {
  const select = $("tokenSelect");
  select.innerHTML = '<option value="">自动选择</option>';
  try {
    const res = await fetch("/api/tokens", { credentials: "include" });
    if (!res.ok) return;
    const tokens = await res.json();
    const groups = {};
    (Array.isArray(tokens) ? tokens : []).forEach(token => {
      const group = token.token_group || "default";
      if (!groups[group]) groups[group] = [];
      groups[group].push(token);
    });
    Object.keys(groups).sort().forEach(group => {
      const optgroup = document.createElement("optgroup");
      optgroup.label = group;
      groups[group].forEach(token => {
        const option = document.createElement("option");
        option.value = token.id;
        option.disabled = !token.is_active;
        option.textContent = `#${token.id} ${token.email || "-"}${token.is_active ? "" : "（禁用）"}`;
        optgroup.appendChild(option);
      });
      select.appendChild(optgroup);
    });
  } catch (_) {}
}

async function loadModels() {
  const baseUrl = $("baseUrl").value.trim();
  const apiKey = $("apiKey").value.trim();
  if (!baseUrl || !apiKey) {
    state.models = {...FALLBACK_MODELS};
    renderModels();
    return;
  }
  try {
    const res = await fetch(`${baseUrl}/v1/models`, {
      headers: { Authorization: `Bearer ${apiKey}` },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const imageModels = {};
    (data.data || []).forEach(item => {
      if (String(item.id || "").includes("image") || String(item.id || "").startsWith("imagen")) {
        imageModels[item.id] = item.description || item.id;
      }
    });
    state.models = Object.keys(imageModels).length ? {...FALLBACK_MODELS, ...imageModels} : {...FALLBACK_MODELS};
  } catch (error) {
    state.models = {...FALLBACK_MODELS};
    log(`\n模型列表加载失败，已使用内置模型：${error.message}\n`);
  }
  renderModels();
}

function buildMessages(prompt) {
  const content = [{ type: "text", text: prompt }];
  state.images.forEach(src => content.push({ type: "image_url", image_url: { url: src } }));
  return [{ role: "user", content }];
}

function cleanMediaUrlCandidate(raw) {
  let url = String(raw || "").trim().replace(/^<|>$/g, "").replace(/^['"]|['"]$/g, "").replace(/&amp;/g, "&");
  if (!/^data:/i.test(url)) {
    url = url.replace(/[).;]+$/g, "");
  }
  return url;
}

function normalizeMediaUrl(raw) {
  let url = cleanMediaUrlCandidate(raw);
  if (!url) return "";
  if (url.startsWith("//")) url = `${window.location.protocol}${url}`;
  if (url.startsWith("/")) url = new URL(url, $("baseUrl").value.trim() || window.location.origin).href;
  return url;
}

function addMedia(media, type, url) {
  const normalized = normalizeMediaUrl(url);
  if (!normalized || media.seen.has(`${type}:${normalized}`)) return;
  media.seen.add(`${type}:${normalized}`);
  media.items.push({type, url: normalized});
}

function extractMediaFromString(text, media) {
  const value = String(text || "");
  const markdownImageRegex = /!\[[^\]]*]\((<[^>]+>|[^\s)]+)(?:\s+["'][^)]*["'])?\)/g;
  const htmlImageRegex = /<img[^>]+src=['"]([^'"]+)['"]/gi;
  const htmlVideoRegex = /<video[^>]+src=['"]([^'"]+)['"]/gi;
  const imageUrlRegex = /(data:image\/[a-z0-9.+-]+;base64,[a-z0-9+/=_-]+|https?:\/\/[^\s"'<>]*(?:googleusercontent\.com|ggpht\.com|flow-content\.google)[^\s"'<>]*|https?:\/\/[^\s"'<>]+\/[^\s"'<>]+\.(?:png|jpe?g|webp|gif)(?:[^\s"'<>]*)?|\/[^\s"'<>]+\.(?:png|jpe?g|webp|gif)(?:[^\s"'<>]*)?)/gi;
  const videoUrlRegex = /(https?:\/\/[^\s"'<>]+\.(?:mp4|webm|mov)(?:[^\s"'<>]*)?|\/[^\s"'<>]+\.(?:mp4|webm|mov)(?:[^\s"'<>]*)?)/gi;
  let match;
  while ((match = markdownImageRegex.exec(value)) !== null) addMedia(media, "image", match[1]);
  while ((match = htmlImageRegex.exec(value)) !== null) addMedia(media, "image", match[1]);
  while ((match = htmlVideoRegex.exec(value)) !== null) addMedia(media, "video", match[1]);
  while ((match = imageUrlRegex.exec(value)) !== null) addMedia(media, "image", match[1]);
  while ((match = videoUrlRegex.exec(value)) !== null) addMedia(media, "video", match[1]);
}

function addGeminiInlineMedia(value, media) {
  const inlineData = value?.inlineData || value?.inline_data;
  if (!inlineData || typeof inlineData !== "object") return;
  const mimeType = String(inlineData.mimeType || inlineData.mime_type || "image/png").toLowerCase();
  const data = inlineData.data;
  if (typeof data !== "string" || !data) return;
  if (mimeType.startsWith("image/")) addMedia(media, "image", `data:${mimeType};base64,${data}`);
  if (mimeType.startsWith("video/")) addMedia(media, "video", `data:${mimeType};base64,${data}`);
}

function addGeminiFileMedia(value, media) {
  const fileData = value?.fileData || value?.file_data;
  if (!fileData || typeof fileData !== "object") return;
  const mimeType = String(fileData.mimeType || fileData.mime_type || "").toLowerCase();
  const fileUri = fileData.fileUri || fileData.file_uri;
  if (typeof fileUri !== "string" || !fileUri) return;
  if (mimeType.startsWith("video/")) {
    addMedia(media, "video", fileUri);
  } else if (mimeType.startsWith("image/")) {
    addMedia(media, "image", fileUri);
  } else {
    extractMediaFromString(fileUri, media);
  }
}

function extractMediaFromJson(value, media) {
  if (value == null) return;
  if (typeof value === "string") {
    extractMediaFromString(value, media);
    return;
  }
  if (Array.isArray(value)) {
    value.forEach(item => extractMediaFromJson(item, media));
    return;
  }
  if (typeof value !== "object") return;

  addGeminiInlineMedia(value, media);
  addGeminiFileMedia(value, media);

  const imageKeys = ["url", "image_url", "imageUrl", "image", "mediaUrl", "downloadUrl", "fifeUrl"];
  imageKeys.forEach(key => {
    const candidate = value[key];
    if (typeof candidate === "string") addMedia(media, "image", candidate);
    if (candidate && typeof candidate === "object") extractMediaFromJson(candidate, media);
  });
  if (typeof value.b64_json === "string") addMedia(media, "image", `data:image/png;base64,${value.b64_json}`);
  if (typeof value.encodedImage === "string") addMedia(media, "image", `data:image/png;base64,${value.encodedImage}`);
  if (typeof value.videoUrl === "string") addMedia(media, "video", value.videoUrl);
  if (typeof value.fifeVideoUrl === "string") addMedia(media, "video", value.fifeVideoUrl);

  Object.values(value).forEach(item => extractMediaFromJson(item, media));
}

function normalizeContentText(content) {
  if (content == null) return "";
  if (typeof content === "string") return content;
  if (Array.isArray(content)) {
    return content.map(item => {
      if (typeof item === "string") return item;
      if (item && typeof item === "object") {
        if (typeof item.text === "string") return item.text;
        if (typeof item.content === "string") return item.content;
        return JSON.stringify(item);
      }
      return "";
    }).filter(Boolean).join("");
  }
  if (typeof content === "object") {
    if (typeof content.text === "string") return content.text;
    return JSON.stringify(content);
  }
  return String(content || "");
}

function extractAssistantText(payload) {
  if (payload == null) return "";
  if (typeof payload === "string") return payload;
  const pieces = [];
  if (Array.isArray(payload?.choices)) {
    payload.choices.forEach(choice => {
      const delta = choice?.delta || {};
      const message = choice?.message || {};
      [delta.reasoning_content, delta.content, message.content, choice?.text].forEach(value => {
        const text = normalizeContentText(value);
        if (text) pieces.push(text);
      });
    });
  }
  if (Array.isArray(payload?.candidates)) {
    payload.candidates.forEach(candidate => {
      const parts = candidate?.content?.parts || [];
      parts.forEach(part => {
        if (typeof part?.text === "string") pieces.push(part.text);
      });
    });
  }
  const fallback = normalizeContentText(payload.result || payload.output_text || payload.text);
  if (fallback) pieces.push(fallback);
  return pieces.join("");
}

function extractMediaFromApiPayload(payload) {
  const media = {items: [], seen: new Set()};
  const text = extractAssistantText(payload);
  extractMediaFromString(text, media);
  extractMediaFromJson(payload, media);
  return media.items;
}

function extractMedia(content) {
  const media = {items: [], seen: new Set()};
  const text = String(content || "");
  extractMediaFromString(text, media);
  const trimmed = text.trim().replace(/^```(?:json)?\s*/i, "").replace(/```$/i, "").trim();
  if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
    try {
      extractMediaFromJson(JSON.parse(trimmed), media);
    } catch (_) {}
  }
  return media.items;
}

function renderResult(content) {
  const result = $("outputResult");
  result.innerHTML = "";
  extractMediaFromApiPayload(content).forEach(item => {
    if (item.type === "video") {
      const video = document.createElement("video");
      video.src = item.url;
      video.controls = true;
      result.appendChild(video);
      return;
    }
    const img = document.createElement("img");
    img.src = item.url;
    img.alt = "生成结果";
    result.appendChild(img);
  });
  const fallbackText = typeof content === "string" ? content : (extractAssistantText(content) || JSON.stringify(content, null, 2));
  if (!result.children.length && fallbackText.trim()) {
    const pre = document.createElement("pre");
    pre.textContent = fallbackText;
    pre.style.whiteSpace = "pre-wrap";
    result.appendChild(pre);
  }
}

function getGenerateCount() {
  const value = Number($("imageCountSelect")?.value || 1);
  return [1, 2, 3, 4].includes(value) ? value : 1;
}

async function requestGeneration({baseUrl, apiKey, model, prompt, tokenId, index, total}) {
  const headers = {
    Authorization: `Bearer ${apiKey}`,
    "Content-Type": "application/json",
  };
  if (tokenId) headers["x-flow2api-token-id"] = tokenId;

  const started = Date.now();
  log(`\n[${new Date().toLocaleTimeString()}] 第 ${index}/${total} 张开始\n`);
  const res = await fetch(`${baseUrl}/v1/chat/completions`, {
    method: "POST",
    headers,
    body: JSON.stringify({
      model,
      messages: buildMessages(prompt),
      stream: true,
      n: 1,
    }),
  });
  if (!res.ok) throw new Error(`第 ${index} 张 HTTP ${res.status}: ${await res.text()}`);

  const responseType = res.headers.get("content-type") || "";
  if (!res.body || !responseType.includes("text/event-stream")) {
    const rawBody = await res.text();
    let payload = rawBody;
    try {
      payload = JSON.parse(rawBody);
    } catch (_) {}
    const text = extractAssistantText(payload) || (typeof payload === "string" ? payload : JSON.stringify(payload, null, 2));
    if (text) log(text);
    const elapsed = ((Date.now() - started) / 1000).toFixed(1);
    log(`\n第 ${index}/${total} 张完成，耗时 ${elapsed}s\n`);
    return payload;
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";
  let full = "";
  const payloads = [];
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n");
    buffer = lines.pop() || "";
    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      const raw = line.slice(6).trim();
      if (!raw || raw === "[DONE]") continue;
      try {
        const parsed = JSON.parse(raw);
        if (parsed.error) throw new Error(parsed.error.message || JSON.stringify(parsed.error));
        payloads.push(parsed);
        const text = extractAssistantText(parsed);
        if (text) {
          full += text;
          log(text);
        }
      } catch (error) {
        if (error.name !== "SyntaxError") throw error;
      }
    }
  }
  const elapsed = ((Date.now() - started) / 1000).toFixed(1);
  log(`\n第 ${index}/${total} 张完成，耗时 ${elapsed}s\n`);
  return {text: full, chunks: payloads};
}

async function generate() {
  if (state.generating) return;
  const baseUrl = $("baseUrl").value.trim();
  const apiKey = $("apiKey").value.trim();
  const model = $("modelSelect").value;
  const prompt = $("promptInput").value.trim();
  const tokenId = $("tokenSelect").value;
  const count = getGenerateCount();
  if (!baseUrl) return alert("请输入服务地址");
  if (!apiKey) return alert("请输入 API Key");
  if (!model) return alert("请选择模型");
  if (!prompt) return alert("请输入提示词");

  state.generating = true;
  $("generateBtn").disabled = true;
  $("outputLog").textContent = "";
  $("outputResult").innerHTML = "";
  setStatus("running", `生成中 0/${count}`);
  log(`[${new Date().toLocaleTimeString()}] 模型: ${model}\n`);
  log(`[${new Date().toLocaleTimeString()}] Token: ${tokenId ? `#${tokenId}` : "自动选择"}\n`);
  log(`[${new Date().toLocaleTimeString()}] 参考图: ${state.images.length}\n`);
  log(`[${new Date().toLocaleTimeString()}] 生成张数: ${count}\n`);

  try {
    const started = Date.now();
    const runs = [];
    for (let i = 1; i <= count; i += 1) {
      setStatus("running", `生成中 ${i}/${count}`);
      runs.push(await requestGeneration({baseUrl, apiKey, model, prompt, tokenId, index: i, total: count}));
      renderResult({runs});
    }
    const elapsed = ((Date.now() - started) / 1000).toFixed(1);
    log(`\n全部完成，共 ${count} 张，耗时 ${elapsed}s\n`);
    renderResult({runs});
    setStatus("done", `完成 ${count} 张 ${elapsed}s`);
  } catch (error) {
    log(`\n请求失败：${error.message}\n`);
    setStatus("error", "失败");
  } finally {
    state.generating = false;
    $("generateBtn").disabled = false;
  }
}

function bindEvents() {
  $("reloadBtn").onclick = async () => {
    await loadAdminDefaults();
    await loadTokens();
    await loadModels();
  };
  $("generateBtn").onclick = generate;
  $("saveDefaultModelBtn").onclick = () => {
    state.defaultModelId = $("modelSelect").value || DEFAULT_MODEL_ID;
    saveSettings();
    setSettingsStatus("已保存默认模型");
  };
  $("applyTemplateBtn").onclick = () => {
    const selected = $("templateSelect").value;
    $("templateTitleInput").value = selected;
    $("promptInput").value = state.templates[selected] || DEFAULT_PROMPT;
  };
  $("saveTemplateBtn").onclick = () => {
    const oldTitle = $("templateSelect").value;
    const title = $("templateTitleInput").value.trim();
    const prompt = $("promptInput").value.trim();
    if (!title) return alert("请输入模板标题");
    if (!prompt) return alert("请输入模板内容");
    if (oldTitle && oldTitle !== title && state.templates[oldTitle]) delete state.templates[oldTitle];
    state.templates[title] = prompt;
    saveSettings();
    renderTemplates();
    $("templateSelect").value = title;
    $("templateTitleInput").value = title;
    $("promptInput").value = prompt;
    setSettingsStatus("模板已保存");
  };
  $("templateSelect").onchange = () => {
    const selected = $("templateSelect").value;
    $("templateTitleInput").value = selected;
    $("promptInput").value = state.templates[selected] || DEFAULT_PROMPT;
  };
  $("clearImagesBtn").onclick = () => {
    state.images = [];
    renderImages();
  };
  $("tokenSelect").onchange = () => {
    const option = $("tokenSelect").selectedOptions[0];
    $("tokenHint").textContent = option?.value ? option.textContent : "自动选择";
  };
  $("dropzone").onclick = event => {
    if (event.target.closest(".remove")) return;
    $("fileInput").click();
  };
  $("fileInput").onchange = event => addFiles(event.target.files);
  $("dropzone").ondragover = event => {
    event.preventDefault();
    $("dropzone").classList.add("dragover");
  };
  $("dropzone").ondragleave = () => $("dropzone").classList.remove("dragover");
  $("dropzone").ondrop = event => {
    event.preventDefault();
    $("dropzone").classList.remove("dragover");
    addFiles(event.dataTransfer.files);
  };
  document.addEventListener("paste", event => {
    const files = [];
    for (const item of event.clipboardData?.items || []) {
      if (item.type.startsWith("image/")) {
        const file = item.getAsFile();
        if (file) files.push(file);
      }
    }
    if (files.length) {
      event.preventDefault();
      addFiles(files);
    }
  });
}

(async function init() {
  $("baseUrl").value = window.location.origin;
  loadSavedSettings();
  renderTemplates();
  renderModels();
  bindEvents();
  await loadAdminDefaults();
  await loadTokens();
  await loadModels();
})();
</script>
